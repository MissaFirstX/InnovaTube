<div class="auth-page">
  <mat-card class="auth-card">
    <div class="auth-header">
      <div class="brand-badge">
        <mat-icon>play_circle</mat-icon>
      </div>
      <h2>Iniciar sesión</h2>
      <p>Accede a tu cuenta y vuelve a disfrutar de InnovaTube.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="username" placeholder="Tu usuario" />
        <mat-error *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.errors?.['required']">
          El usuario es obligatorio.
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Contraseña</mat-label>
        <input matInput type="password" formControlName="password" placeholder="Tu contraseña" />
        <mat-error *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">
          La contraseña es obligatoria.
        </mat-error>
        <mat-error *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']">
          Mínimo 6 caracteres.
        </mat-error>
      </mat-form-field>

      <div class="message error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button mat-flat-button color="primary" class="submit-btn" type="submit" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Entrar</span>
        <span *ngIf="isSubmitting" class="spinner-row">
          <mat-spinner diameter="20"></mat-spinner>
          <span>Ingresando...</span>
        </span>
      </button>

      <p class="link-row">
        ¿No tienes cuenta?
        <a routerLink="/register">Regístrate</a>
      </p>
    </form>
  </mat-card>
</div>
